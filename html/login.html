<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập – Sử Việt</title>
  <link rel="stylesheet" href="../css/login.css"/>
</head>
<body>

  <div class="main-container">

    <!-- FORM TRÁI -->
    <div class="left-side">
      <form id="loginForm" class="form-card">

        <!-- Logo căn giữa -->
        <div class="logo-wrap">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="44" height="44">
            <defs>
              <linearGradient id="gG" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"   stop-color="#BF9B30"/>
                <stop offset="50%"  stop-color="#F9F1B7"/>
                <stop offset="100%" stop-color="#BF9B30"/>
              </linearGradient>
            </defs>
            <path d="M42,35 L33,38 L33,72 L42,68 Z" fill="url(#gG)"/>
            <path d="M45,35 L36,38 L36,75 L45,71 Z" fill="url(#gG)" opacity=".8"/>
            <path d="M48,35 C55,55 58,65 60,78 C65,60 75,40 88,22 L84,19 C72,37 62,57 58,72 C56,62 52,45 48,35Z" fill="url(#gG)"/>
            <polygon points="88,16 90,21 96,21 91,25 93,31 88,27 83,31 85,25 80,21 86,21" fill="url(#gG)"/>
          </svg>
          <span class="logo-text">Sử<em>Việt</em></span>
        </div>

        <!-- Tiêu đề + phân cách -->
        <h2>Đăng nhập tài khoản</h2>
        <div class="title-divider"></div>
        <p class="form-sub">Chào mừng trở lại — tiếp tục hành trình học sử</p>

        <!-- Fields -->
        <div class="field">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" name="username"
                 placeholder="Nhập tên đăng nhập" required/>
        </div>

        <div class="field">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" name="password"
                 placeholder="Nhập mật khẩu" required/>
        </div>

        <button type="submit" class="btn-login">Vào học ngay</button>

        <div class="register-redirect">
          Chưa có tài khoản?
          <a href="register.html" class="link-pretty">Đăng ký tại đây</a>
        </div>

      </form>
    </div>

    <!-- TRỐNG ĐỒNG BÊN PHẢI — GIỮ NGUYÊN 100% -->
    <div class="right-side">
      <div class="drum-container">
        <div class="drum-glow"></div>
        <div class="bronze-drum"></div>
        <div class="epic-title">
          <span class="sub-text">Khởi nguồn tri thức</span>
          <h1 class="main-text">HÀO KHÍ VIỆT</h1>
          <div class="line-deco"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Màn hình thành công -->
  <div class="success-screen" id="successOverlay">
    <div class="success-box">
      <div class="icon-star">★</div>
      <h3>ĐĂNG NHẬP THÀNH CÔNG</h3>
      <p id="successMsg">Đang đưa sĩ tử tới trang học tập...</p>
    </div>
  </div>
  <a href="../html/index.html" class="back-to-guest" title="Quay về trang chủ">
  <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="19" y1="12" x2="5" y2="12"></line>
    <polyline points="12 19 5 12 12 5"></polyline>
  </svg>
  <span>Trang khách</span>
</a>

  <script src="../js/auth.js"></script>
</body>
</html>
